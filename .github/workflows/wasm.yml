name: "WASM Build & Deploy"

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build-wasm:
    runs-on: ubuntu-latest
    steps:

    - name: "Checkout"
      uses: actions/checkout@v4

    - name: "Setup Emscripten"
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: "3.1.73"
        actions-cache-folder: "emsdk-cache"

    - name: "Build WASM"
      env:
        EM_EXCLUSIVE_CACHE_ACCESS: "1"
      run: |
        # Pre-build dependencies so SDL2_image port won't trigger them
        embuilder build sdl2 zlib libpng
        mkdir -p web
        echo "=== emcc version ==="
        emcc --version
        echo "=== Building with STACK_SIZE=4194304 ==="
        emcc -v \
          src/brogue/*.c \
          src/variants/*.c \
          src/platform/main.c \
          src/platform/platformdependent.c \
          src/platform/null-platform.c \
          src/platform/sdl2-platform.c \
          src/platform/tiles.c \
          -Isrc/brogue -Isrc/platform -Isrc/variants \
          -std=c99 -O2 \
          -Wall -Wno-parentheses -Wno-unused-result -Wformat \
          -DBROGUE_SDL \
          -DDATADIR=. \
          -DRELEASE \
          -DBROGUE_EXTRA_VERSION= \
          -sUSE_SDL=2 \
          -sUSE_SDL_IMAGE=2 \
          "-sSDL2_IMAGE_FORMATS=[\"png\"]" \
          -sASYNCIFY \
          -sASYNCIFY_STACK_SIZE=131072 \
          "-sASYNCIFY_REMOVE=['Emscripten_HandleMouseMove','Emscripten_HandleMouseButton','Emscripten_HandleMouseFocus','Emscripten_HandleWheel','Emscripten_HandleKey','Emscripten_HandleKeyPress','Emscripten_HandleFullscreenChange','Emscripten_HandleResize','Emscripten_HandleCanvasResize','Emscripten_HandleVisibilityChange','Emscripten_HandleFocus','Emscripten_HandlePointerLockChange','Emscripten_HandleTouch']" \
          -sASSERTIONS=1 \
          -sALLOW_MEMORY_GROWTH=1 \
          -sINITIAL_MEMORY=67108864 \
          -sSTACK_SIZE=4194304 \
          --preload-file bin/assets@assets \
          --shell-file src/platform/shell.html \
          -o web/brogue.html

    - name: "Verify stack size in build output"
      run: |
        echo "=== Install wabt for wasm-objdump ==="
        sudo apt-get install -y wabt 2>/dev/null || true
        echo "=== WASM globals (stack-related) ==="
        wasm-objdump -x web/brogue.wasm 2>/dev/null | grep -i stack || echo "wasm-objdump not available"
        echo "=== WASM global section ==="
        wasm-objdump -x web/brogue.wasm 2>/dev/null | head -60 || true
        echo "=== Node.js: read WASM stack globals ==="
        node -e "
          const fs = require('fs');
          const buf = fs.readFileSync('web/brogue.wasm');
          const mod = new WebAssembly.Module(buf);
          const exports = WebAssembly.Module.exports(mod);
          console.log('Exports with stack in name:');
          exports.filter(e => /stack/i.test(e.name)).forEach(e => console.log(' ', e));
          // Instantiate with minimal imports to read globals
          const imports = WebAssembly.Module.imports(mod);
          console.log('Imports with stack in name:');
          imports.filter(i => /stack/i.test(i.name)).forEach(i => console.log(' ', i));
        " || echo "Node check failed"
        echo "=== JS: grep for stack_base/stack_end assignments ==="
        grep -oP '(stack_base|stack_end|__stack_pointer|STACK_SIZE)\s*[=:]\s*\d+' web/brogue.js | head -10 || true
        echo "=== JS: grep for emscripten_stack ==="
        grep -n 'emscripten_stack' web/brogue.js | head -10 || true
        echo "=== JS file size ==="
        wc -c web/brogue.js web/brogue.wasm

    - name: "Add SharedArrayBuffer support (coi-serviceworker)"
      run: cp src/platform/coi-serviceworker.min.js web/

    - name: "Setup Pages"
      uses: actions/configure-pages@v5

    - name: "Upload Pages artifact"
      uses: actions/upload-pages-artifact@v3
      with:
        path: web/

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: "Deploy to GitHub Pages"
      id: deployment
      uses: actions/deploy-pages@v4
