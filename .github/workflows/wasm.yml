name: "WASM Build & Deploy"

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build-wasm:
    runs-on: ubuntu-latest
    steps:

    - name: "Checkout"
      uses: actions/checkout@v4

    - name: "Setup Emscripten"
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: "3.1.73"
        actions-cache-folder: "emsdk-cache"

    - name: "Build WASM"
      env:
        EM_EXCLUSIVE_CACHE_ACCESS: "1"
      run: |
        # Pre-build dependencies so SDL2_image port won't trigger them
        embuilder build sdl2 zlib libpng
        mkdir -p web
        emcc \
          src/brogue/*.c \
          src/variants/*.c \
          src/platform/main.c \
          src/platform/platformdependent.c \
          src/platform/null-platform.c \
          src/platform/sdl2-platform.c \
          src/platform/tiles.c \
          -Isrc/brogue -Isrc/platform -Isrc/variants \
          -std=c99 -O2 \
          -Wall -Wno-parentheses -Wno-unused-result -Wformat \
          -DBROGUE_SDL \
          -DDATADIR=. \
          -DRELEASE \
          -DBROGUE_EXTRA_VERSION= \
          -sUSE_SDL=2 \
          -sUSE_SDL_IMAGE=2 \
          "-sSDL2_IMAGE_FORMATS=[\"png\"]" \
          -sASYNCIFY \
          -sASYNCIFY_STACK_SIZE=131072 \
          -sSTACK_SIZE=4194304 \
          "-sASYNCIFY_REMOVE=['Emscripten_HandleMouseMove','Emscripten_HandleMouseButton','Emscripten_HandleMouseFocus','Emscripten_HandleWheel','Emscripten_HandleKey','Emscripten_HandleKeyPress','Emscripten_HandleFullscreenChange','Emscripten_HandleResize','Emscripten_HandleCanvasResize','Emscripten_HandleVisibilityChange','Emscripten_HandleFocus','Emscripten_HandlePointerLockChange','Emscripten_HandleTouch']" \
          -sASSERTIONS=1 \
          -sALLOW_MEMORY_GROWTH=1 \
          -sINITIAL_MEMORY=67108864 \
          --preload-file bin/assets@assets \
          --shell-file src/platform/shell.html \
          -o web/brogue.html

    - name: "Verify stack size in build output"
      run: |
        node -e "
        const fs = require('fs');
        const js = fs.readFileSync('web/brogue.js', 'utf8');
        // Search for stack-related values
        const m = js.match(/emscripten_stack_init\((\d+),\s*(\d+)\)/);
        if (m) {
          const base = parseInt(m[1]);
          const end = parseInt(m[2]);
          console.log('Stack base:', base, '(0x' + base.toString(16) + ')');
          console.log('Stack end:', end, '(0x' + end.toString(16) + ')');
          console.log('Stack size:', base - end, 'bytes');
        } else {
          console.log('Could not find emscripten_stack_init pattern');
          // Try to find any stack-related constants
          const m2 = js.match(/65536|4194304|8388608/g);
          console.log('Found values:', m2 ? m2.slice(0, 10) : 'none');
        }
        "

    - name: "Add SharedArrayBuffer support (coi-serviceworker)"
      run: cp src/platform/coi-serviceworker.min.js web/

    - name: "Setup Pages"
      uses: actions/configure-pages@v5

    - name: "Upload Pages artifact"
      uses: actions/upload-pages-artifact@v3
      with:
        path: web/

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: "Deploy to GitHub Pages"
      id: deployment
      uses: actions/deploy-pages@v4
