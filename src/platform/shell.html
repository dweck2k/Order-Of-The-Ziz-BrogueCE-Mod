<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Of The Ziz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #c8a84b;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      padding: 12px 8px;
    }

    header {
      text-align: center;
      padding: 10px 0 8px;
      letter-spacing: 0.04em;
    }

    header h1 {
      font-size: 1.6rem;
      color: #e8c55b;
      text-shadow: 0 0 24px #c8a84b55;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
    }

    header p {
      font-size: 0.8rem;
      color: #7a6030;
      font-style: italic;
      direction: rtl;
    }

    /* ── Canvas area ── */
    #canvas-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 1400px;
      overflow: hidden;
    }

    canvas {
      display: block;
      border: 1px solid #1e1808;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    canvas:focus { outline: none; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      min-height: 420px;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.5s;
      padding: 20px;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Menorah SVG */
    .menorah-wrap {
      margin-bottom: 18px;
    }

    .menorah-arm {
      stroke: #7a5c18;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
    }

    .menorah-base {
      stroke: #6a4e14;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes flicker {
      0%,100% { opacity: 1;   transform: scaleY(1)   scaleX(1); }
      25%      { opacity: 0.8; transform: scaleY(1.1) scaleX(0.9); }
      50%      { opacity: 0.9; transform: scaleY(0.95) scaleX(1.05); }
      75%      { opacity: 1;   transform: scaleY(1.08) scaleX(0.92); }
    }

    .flame { transform-origin: center bottom; }
    .flame:nth-child(1) { animation: flicker 1.7s ease-in-out infinite 0.0s; }
    .flame:nth-child(2) { animation: flicker 1.9s ease-in-out infinite 0.3s; }
    .flame:nth-child(3) { animation: flicker 1.5s ease-in-out infinite 0.7s; }
    .flame:nth-child(4) { animation: flicker 2.1s ease-in-out infinite 0.1s; }
    .flame:nth-child(5) { animation: flicker 1.6s ease-in-out infinite 0.5s; }
    .flame:nth-child(6) { animation: flicker 1.8s ease-in-out infinite 0.9s; }
    .flame:nth-child(7) { animation: flicker 2.0s ease-in-out infinite 0.2s; }

    /* Lore quote */
    #lore-quote {
      font-size: 0.82rem;
      color: #a88838;
      max-width: 400px;
      text-align: center;
      min-height: 3.4em;
      line-height: 1.65;
      font-style: italic;
      margin-bottom: 6px;
      opacity: 1;
      transition: opacity 0.55s ease;
    }

    #lore-quote.fade { opacity: 0; }

    #lore-source {
      font-size: 0.6rem;
      color: #4a3810;
      letter-spacing: 0.05em;
      margin-bottom: 22px;
      min-height: 1em;
    }

    /* Progress */
    .progress-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .progress-bar-bg {
      width: 260px;
      height: 3px;
      background: #141008;
      border: 1px solid #2e2008;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a3010, #e8c55b, #4a3010);
      background-size: 200% 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
      animation: shimmer 2.5s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    #status-text {
      font-size: 0.6rem;
      color: #3a2808;
      min-height: 1em;
      text-align: center;
      letter-spacing: 0.04em;
    }

    #error-message {
      display: none;
      color: #c86060;
      font-size: 0.78rem;
      max-width: 440px;
      text-align: center;
      padding: 14px 18px;
      border: 1px solid #4a1818;
      background: #0e0404;
      margin-top: 16px;
      line-height: 1.6;
      border-radius: 2px;
    }

    footer {
      padding: 10px 0;
      font-size: 0.6rem;
      color: #251808;
      text-align: center;
    }

    footer a { color: #3a2608; text-decoration: none; }
    footer a:hover { color: #c8a84b; transition: color 0.2s; }
  </style>
</head>
<body>
  <!-- Enable SharedArrayBuffer on GitHub Pages (needed for pthreads/PROXY_TO_PTHREAD) -->
  <script>
    if(!window.crossOriginIsolated){
      // Register service worker that adds COOP/COEP headers, then reload.
      // Stop page loading to prevent Emscripten from starting without SharedArrayBuffer.
      navigator.serviceWorker.register('coi-serviceworker.min.js').then(function(reg){
        if(reg.active&&!navigator.serviceWorker.controller){
          window.location.reload();
        }else if(!reg.active){
          var sw=reg.installing||reg.waiting;
          sw.addEventListener('statechange',function(){
            if(sw.state==='activated')window.location.reload();
          });
        }
      });
      // Halt document parsing so Emscripten doesn't start before reload
      window.stop();
      document.body.innerHTML='<div style="color:#c8a84b;font-family:monospace;text-align:center;margin-top:40vh"><h2>Preparing cross-origin isolation...</h2><p>The page will reload automatically.</p></div>';
    }
  </script>

  <header>
    <h1>Order Of The Ziz</h1>
    <p>לצלול למעמקי האדמה, אל האופל. אל התועבה.</p>
  </header>

  <div id="canvas-container">
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>

    <div id="loading-overlay">

      <!-- Menorah SVG -->
      <div class="menorah-wrap">
        <svg viewBox="0 0 200 162" xmlns="http://www.w3.org/2000/svg" width="180" height="145" aria-hidden="true">

          <!-- Animated flames (7) -->
          <g id="flames">
            <ellipse class="flame" cx="10"  cy="8" rx="3.5" ry="7" fill="#e8c55b" opacity="0.85"/>
            <ellipse class="flame" cx="40"  cy="8" rx="3.5" ry="7" fill="#e8c55b" opacity="0.85"/>
            <ellipse class="flame" cx="70"  cy="8" rx="3.5" ry="7" fill="#e8c55b" opacity="0.85"/>
            <ellipse class="flame" cx="100" cy="8" rx="3.5" ry="7" fill="#f0d870" opacity="0.9"/>
            <ellipse class="flame" cx="130" cy="8" rx="3.5" ry="7" fill="#e8c55b" opacity="0.85"/>
            <ellipse class="flame" cx="160" cy="8" rx="3.5" ry="7" fill="#e8c55b" opacity="0.85"/>
            <ellipse class="flame" cx="190" cy="8" rx="3.5" ry="7" fill="#e8c55b" opacity="0.85"/>
          </g>

          <!-- Arms: quadratic bezier from center shaft outward and up -->
          <!-- Each arm: M center_x,arm_y  Q candle_x,arm_y  candle_x,candle_top -->
          <g class="menorah-arm">
            <!-- Inner arms (connect at y=72) -->
            <path d="M 100,72 Q  70,72  70,15"/>
            <path d="M 100,72 Q 130,72 130,15"/>
            <!-- Middle arms (connect at y=84) -->
            <path d="M 100,84 Q  40,84  40,15"/>
            <path d="M 100,84 Q 160,84 160,15"/>
            <!-- Outer arms (connect at y=96) -->
            <path d="M 100,96 Q  10,96  10,15"/>
            <path d="M 100,96 Q 190,96 190,15"/>
            <!-- Center shaft -->
            <line x1="100" y1="15" x2="100" y2="112"/>
          </g>

          <!-- Base -->
          <g class="menorah-base">
            <!-- Neck -->
            <path d="M 84,112 Q 100,118 116,112"/>
            <!-- Platform tiers -->
            <path d="M 60,124 L 140,124"/>
            <path d="M 60,118 L 60,124"/>
            <path d="M 140,118 L 140,124"/>
            <path d="M 44,136 L 156,136"/>
            <path d="M 44,124 L 44,136"/>
            <path d="M 156,124 L 156,136"/>
            <path d="M 50,148 Q 100,155 150,148"/>
          </g>

        </svg>
      </div>

      <div id="lore-quote"></div>
      <div id="lore-source"></div>

      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div id="status-text">Descending into the burrow&hellip;</div>
      </div>

      <div id="error-message"></div>
    </div>
  </div>

  <footer>
    based on <a href="https://github.com/tmewett/BrogueCE" target="_blank">BrogueCE</a>
    &bull; <a href="https://github.com/dweck2k/Order-Of-The-Ziz-BrogueCE-Mod" target="_blank">source</a>
  </footer>

  <script type="text/javascript">
    // ── Lore quotes ───────────────────────────────────────────────
    var loreQuotes = [
      { text: "The stone here is young. Too young to remember mercy. The earth opens without ceremony.", src: "Level 1 — The Mouth of the Burrow" },
      { text: "This entrance was not hidden. It was abandoned. No one seals a door they still believe in.", src: "Level 1 — The Mouth of the Burrow" },
      { text: "Dust settles as you step inside. The world above closes quietly behind you.", src: "Level 1 — The Mouth of the Burrow" },
      { text: "You feel watched, but nothing looks back. Not yet.", src: "Level 1 — The Mouth of the Burrow" },
      { text: "Scratches cover the walls. Not claws. Fingernails.", src: "Level 5 — First Signs" },
      { text: "Names are carved, erased, then carved again. Someone cared enough to correct them.", src: "Level 5 — First Signs" },
      { text: "The Cult said others came before. Now you believe them.", src: "Level 5 — First Signs" },
      { text: "This chamber was once a place of study. Fear came later.", src: "Level 10 — The Remembering" },
      { text: "Half-finished rituals litter the ground. No one stayed to finish them.", src: "Level 10 — The Remembering" },
      { text: "The Abomination learned patience in this place.", src: "Level 10 — The Remembering" },
      { text: "You stand between decay and record. Both lead downward.", src: "Level 13 — The Split Path" },
      { text: "Choice is made without certainty. It always is.", src: "Level 13 — The Split Path" },
      { text: "These beings were human once. Now they serve without knowing whom.", src: "Level 16 — The Servants" },
      { text: "Corruption did not break them. It redirected them.", src: "Level 16 — The Servants" },
      { text: "The Cult warned you: belief can be weaponized.", src: "Level 16 — The Servants" },
      { text: "The walls remember what the tongue must not say.", src: "Level 19 — The Weight of Names" },
      { text: "Knowledge accumulates here like pressure.", src: "Level 19 — The Weight of Names" },
      { text: "The Book was hidden for reasons beyond fear.", src: "Level 19 — The Weight of Names" },
      { text: "Nothing moves. Nothing breathes.", src: "Level 22 — The Chamber of Silence" },
      { text: "The absence is deliberate.", src: "Level 22 — The Chamber of Silence" },
      { text: "The burrow tightens, aware of your presence.", src: "Level 24 — The Heart of the Burrow" },
      { text: "Law and heresy bind the seal together.", src: "Level 24 — The Heart of the Burrow" },
      { text: "The Book is heavier than flesh should allow.", src: "Level 26 — The Book of the Abomination" },
      { text: "The Abomination does not scream. It remembers.", src: "Level 26 — The Book of the Abomination" },
      { text: "You carry consequence, not triumph.", src: "Level 26 — The Book of the Abomination" },
      { text: "You did not save the world. You corrected its course.", src: "Ending — Return with the Book" },
      { text: "The world remains unaware. This is success.", src: "Ending — Return with the Book" },
    ];

    var quoteEl  = document.getElementById('lore-quote');
    var sourceEl = document.getElementById('lore-source');
    var quoteIdx = Math.floor(Math.random() * loreQuotes.length);

    function setQuote(idx) {
      quoteEl.textContent  = '\u201c' + loreQuotes[idx].text + '\u201d';
      sourceEl.textContent = '\u2014 ' + loreQuotes[idx].src;
    }

    function showNextQuote() {
      quoteEl.classList.add('fade');
      setTimeout(function() {
        quoteIdx = (quoteIdx + 1) % loreQuotes.length;
        setQuote(quoteIdx);
        quoteEl.classList.remove('fade');
      }, 600);
    }

    setQuote(quoteIdx);
    var quoteTimer = setInterval(showNextQuote, 4500);

    // ── Emscripten Module ─────────────────────────────────────────
    var statusEl   = document.getElementById('status-text');
    var fillEl     = document.getElementById('progress-fill');
    var overlayEl  = document.getElementById('loading-overlay');
    var errorEl    = document.getElementById('error-message');
    var totalDeps  = 0;

    // ── Adaptive canvas sizing ──────────────────────────────────
    function fitCanvas() {
      var canvas = document.getElementById('canvas');
      var container = document.getElementById('canvas-container');
      if (!canvas.width || !canvas.height || !container.clientWidth) return;
      var cw = container.clientWidth;
      var ch = container.clientHeight;
      var aspectRatio = canvas.width / canvas.height;
      var w, h;
      if (cw / ch > aspectRatio) {
        h = ch;
        w = Math.floor(ch * aspectRatio);
      } else {
        w = cw;
        h = Math.floor(cw / aspectRatio);
      }
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
    }
    // Re-fit when container resizes (window resize, layout changes)
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(fitCanvas).observe(document.getElementById('canvas-container'));
    } else {
      window.addEventListener('resize', fitCanvas);
    }
    // Re-fit when SDL changes the canvas backing store dimensions
    new MutationObserver(fitCanvas).observe(document.getElementById('canvas'), {
      attributes: true, attributeFilter: ['width', 'height']
    });

    var Module = {
      canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener('webglcontextlost', function(e) {
          alert('WebGL context lost — please reload the page.');
          e.preventDefault();
        }, false);
        return c;
      })(),

      preRun: [function() {
        // Mount IDBFS for persistent saves
        FS.mkdir('/saves');
        FS.mount(IDBFS, {}, '/saves');
        Module.addRunDependency('idbfs-load');
        FS.syncfs(true, function(err) {
          if (err) console.error('IDBFS load error:', err);
          FS.chdir('/saves');
          Module.removeRunDependency('idbfs-load');
        });
      }],

      setStatus: function(text) {
        if (!Module.setStatus.last) Module.setStatus.last = { text: '' };
        if (text === Module.setStatus.last.text) return;
        Module.setStatus.last.text = text;
        if (text) {
          statusEl.textContent = text;
        } else {
          clearInterval(quoteTimer);
          overlayEl.classList.add('hidden');
          setTimeout(function() { overlayEl.style.display = 'none'; }, 500);
          document.getElementById('canvas').focus();
        }
      },

      monitorRunDependencies: function(left) {
        totalDeps = Math.max(totalDeps, left);
        if (totalDeps > 0) {
          fillEl.style.width = Math.round((totalDeps - left) / totalDeps * 100) + '%';
        }
      },

      onAbort: function(what) {
        clearInterval(quoteTimer);
        errorEl.style.display = 'block';
        errorEl.innerHTML = '<strong>Failed to start the game.</strong><br><br>' + what + '<br><br>Try a hard refresh (Ctrl+Shift+R).';
        overlayEl.classList.remove('hidden');
        overlayEl.style.display = 'flex';
      },

      print:    function(t) { console.log(Array.prototype.join.call(arguments,' ')); },
      printErr: function(t) { console.error(Array.prototype.join.call(arguments,' ')); }
    };

    // ── Persist saves to IndexedDB ──────────────────────────────
    function syncSaves() {
      if (typeof FS !== 'undefined' && Module.calledRun) {
        FS.syncfs(false, function(err) {
          if (err) console.error('IDBFS sync error:', err);
        });
      }
    }
    setInterval(syncSaves, 5000);
    window.addEventListener('beforeunload', syncSaves);

    // Call fitCanvas once the game starts rendering
    var origSetStatus = Module.setStatus;
    Module.setStatus = function(text) {
      origSetStatus.call(Module, text);
      if (!text) setTimeout(fitCanvas, 100);
    };

    window.addEventListener('error', function(e) {
      clearInterval(quoteTimer);
      errorEl.style.display = 'block';
      errorEl.innerHTML = '<strong>Failed to start the game.</strong><br><br>' + e.message + '<br><br>Try a hard refresh (Ctrl+Shift+R).';
    });
  </script>

  {{{ SCRIPT }}}

</body>
</html>
